<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">Isaac Lab quadruped robotics preview</title>
  <desc id="desc">A soft robotics simulation scene with yellow quadruped robots on a pale grid floor.</desc>
  <defs>
    <linearGradient id="floor" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#eff0e8"/>
      <stop offset="0.55" stop-color="#d8dcd4"/>
      <stop offset="1" stop-color="#bfc7bf"/>
    </linearGradient>
    <linearGradient id="robot" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f6e46a"/>
      <stop offset="0.48" stop-color="#d4b738"/>
      <stop offset="1" stop-color="#8b7422"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="10" flood-color="#172026" flood-opacity="0.2"/>
    </filter>
    <g id="quad" stroke-linecap="round" stroke-linejoin="round">
      <ellipse cx="146" cy="176" rx="116" ry="46" fill="#1f2629" opacity="0.16"/>
      <path d="M54 130 36 236M96 150 86 280M198 150 214 280M240 130 270 236" fill="none" stroke="#171c1f" stroke-width="18"/>
      <path d="M30 234h36M70 280h42M196 280h42M252 236h42" fill="none" stroke="#171c1f" stroke-width="15"/>
      <path d="M62 88h174l42 36-20 66H82L36 138z" fill="url(#robot)" stroke="#1b2022" stroke-width="8"/>
      <path d="M88 72h112l36 22H64z" fill="#f6df55" stroke="#1b2022" stroke-width="7"/>
      <rect x="102" y="108" width="86" height="44" rx="8" fill="#20282a"/>
      <rect x="118" y="120" width="54" height="20" rx="5" fill="#f2d64d"/>
      <path d="M44 138h-26l-10-22 26-18 30 10z" fill="#1c2224" stroke="#1b2022" stroke-width="7"/>
      <path d="M256 126h34l18 30-28 28-34-8z" fill="#1c2224" stroke="#1b2022" stroke-width="7"/>
      <circle cx="32" cy="116" r="7" fill="#e7d05b"/>
      <circle cx="286" cy="154" r="7" fill="#e7d05b"/>
    </g>
  </defs>
  <rect width="920" height="520" fill="url(#floor)"/>
  <g opacity="0.38" stroke="#9ba79e" stroke-width="1">
    <path d="M0 388h920M0 326h920M0 272h920M0 224h920M0 182h920M0 144h920M0 110h920"/>
    <path d="M78 520 340 0M205 520 398 0M334 520 460 0M463 520 520 0M590 520 582 0M720 520 646 0M842 520 708 0"/>
  </g>
  <g opacity="0.45" filter="url(#blur)">
    <g transform="translate(92 86) scale(.48) rotate(-7)">
      <use href="#quad"/>
    </g>
    <g transform="translate(688 92) scale(.44) rotate(8)">
      <use href="#quad"/>
    </g>
    <g transform="translate(518 62) scale(.36) rotate(-3)">
      <use href="#quad"/>
    </g>
    <g transform="translate(804 164) scale(.34) rotate(10)">
      <use href="#quad"/>
    </g>
    <g transform="translate(28 166) scale(.34) rotate(-8)">
      <use href="#quad"/>
    </g>
  </g>
  <g filter="url(#shadow)" transform="translate(355 190) scale(.82)">
    <use href="#quad"/>
  </g>
  <rect width="920" height="520" fill="none" stroke="#eef0e8" stroke-width="2" opacity="0.55"/>
